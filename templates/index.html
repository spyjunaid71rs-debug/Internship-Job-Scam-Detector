<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Internship Scam Detector</title>

    <link rel="stylesheet" href="/static/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="glass">

        <h1>🛡 Internship Scam Detector</h1>

        <p class="subtitle">
            AI Powered Internship Fraud Detection
        </p>

        <form id="predictionForm">

            <div class="grid">

                <div class="input-group">

                    <label>Internship Title</label>

                    <select id="internship_title">

                        <option>ML Engineer</option>
                        <option>Backend Developer</option>
                        <option>Cloud Engineer</option>
                        <option>Cybersecurity Analyst</option>
                        <option>Data Science Intern</option>
                        <option>Frontend Developer</option>
                        <option>Marketing Intern</option>
                        <option>UI/UX Designer</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>Employment Type</label>

                    <select id="employment_type">

                        <option>Internship</option>
                        <option>Full-Time</option>
                        <option>Part-Time</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>Work Mode</label>

                    <select id="work_mode">

                        <option>Remote</option>
                        <option>Hybrid</option>
                        <option>Onsite</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>Industry</label>

                    <select id="industry">

                        <option>AI</option>
                        <option>Cybersecurity</option>
                        <option>E-Commerce</option>
                        <option>EdTech</option>
                        <option>FinTech</option>
                        <option>Gaming</option>
                        <option>Healthcare</option>
                        <option>Marketing</option>
                        <option>Software</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>Location</label>

                    <select id="location">

                        <option>Bangalore</option>
                        <option>Berlin</option>
                        <option>Dubai</option>
                        <option>London</option>
                        <option>New York</option>
                        <option>San Francisco</option>
                        <option>Singapore</option>
                        <option>Sydney</option>
                        <option>Toronto</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>Company Size</label>

                    <select id="company_size">

                        <option>Startup</option>
                        <option>Small</option>
                        <option>Medium</option>
                        <option>Enterprise</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>Stipend</label>

                    <input
                        type="number"
                        id="stipend"
                        placeholder="30000">

                </div>


                <div class="input-group">

                    <label>Registration Fee</label>

                    <input
                        type="number"
                        id="registration_fee"
                        placeholder="0">

                </div>


                <div class="input-group">

                    <label>Company Website</label>

                    <input
                        type="text"
                        id="website"
                        placeholder="https://company.com">

                </div>


                <div class="input-group">

                    <label>Recruiter Email</label>

                    <input
                        type="email"
                        id="recruiter_email"
                        placeholder="hr@company.com">

                </div>


                <div class="input-group">

                    <label>LinkedIn URL</label>

                    <input
                        type="text"
                        id="linkedin_url"
                        placeholder="https://linkedin.com/company/...">

                </div>


                <div class="input-group">

                    <label>Payment Required</label>

                    <select id="payment_required">

                        <option value="0">No</option>

                        <option value="1">Yes</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>Certificate Offer</label>

                    <select id="fake_certificate_offer">

                        <option value="0">No</option>

                        <option value="1">Yes</option>

                    </select>

                </div>

            </div>


            <button type="submit">

                Analyze Internship

            </button>

        </form>


        <div id="loading">

            <div class="loader"></div>

            <h3>Analyzing Internship...</h3>

        </div>


        <div id="resultCard">

            <h2 id="prediction"></h2>

            <div class="progress">

                <div id="progressBar"></div>

            </div>

            <h3 id="confidence"></h3>

            <h3 id="risk"></h3>

            <h3>Reasons</h3>

            <ul id="reasons"></ul>

        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>

</html>
